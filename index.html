<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonlit Kingdom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="screen">
    <h1>Moonlit Kingdom</h1>
    <p class="subtitle">一个仍在运作的文字王国</p>

    <section id="setup">
      <p>请为你的王国命名：</p>
      <input id="kingdomName" type="text" placeholder="例如：格拉德斯">
      <p>请选择你的身份：</p>
      <select id="identity">
        <option value="女王">女王</option>
        <option value="国王">国王</option>
        <option value="领主">领主</option>
      </select>
     <button onclick="createKingdom()">建立王国</button>
    </section>

    <section id="kingdom" class="hidden">
      <p>━━━━━━━━━━━━</p>
      <h2 id="displayName"></h2>
      <p>第 <span id="day">1</span> 日</p>
      <p>━━━━━━━━━━━━</p>

      <p>统治者：<span id="displayIdentity"></span></p>
      <p>人口：1000</p>
      <p>粮食：500</p>
      <p>黄金：200</p>
      <p>士兵：80</p>
      <p>民心：70</p>

      <p>天气：晴</p>

      <p><a href="#">王宫事务</a></p>
      <p><a href="#">粮仓</a></p>
      <p><a href="#">边境</a></p>
      <p><a href="#">王国日志</a></p>
    </section>
  </main>

  <script src="script.js?v=116"></script>
</body>
</html>
